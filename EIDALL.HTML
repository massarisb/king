<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Mubarak</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 3.5rem;
      color: gold;
      text-shadow: 0 0 20px rgba(255,215,0,0.8);
      margin-bottom: 10px;
    }

    .from {
      font-size: 1.8rem;
      color: #00ffcc;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .box {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      max-width: 500px;
    }

    .names {
      columns: 2;
      font-size: 1.1rem;
      line-height: 1.8;
    }

    .names span {
      display: block;
    }

    .highlight {
      color: gold;
      font-weight: bold;
    }

    .moon {
      font-size: 2.5rem;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 25px gold; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="moon">🌙✨</div>
    <h1>EID MUBARAK</h1>

    <div class="from">
      From Big Bro,<br />
      ZOHAIB AHMED & INSAM UL HAQ
    </div>

    <div class="box">
      <div class="names">
        <span class="highlight">To Father</span>
        <span>Abdul Rahman</span>
        <span>Abdul Qadir</span>
        <span>Umer</span>
        <span>Hamza</span>
        <span>Noor Ahmed</span>
        <span>Muhammad</span>
        <span>Hamid</span>
        <span>Ahmad Azah</span>
        <span>Ibrahim</span>
        <span>Tahirullah</span>
        <span>Ayoub</span>
        <span>Yaqoob</span>
        <span>Abu Bakar</span>
        <span>Usman</span>
        <span>Muhammad Ali</span>
      </div>
    </div>
  </div>
</body>
</html>
